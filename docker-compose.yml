services:
  f2-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f2-web-fpk
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Shanghai
      APP_ENV: package
      FRONTEND_DIST: /opt/f2_web/frontend_dist
      SETTINGS_FILE: /data/config/settings.json
      STATE_DIR: /data/state
      DOWNLOAD_PATH: /data/downloads
    volumes:
      - f2_data:/data
    restart: unless-stopped

volumes:
  f2_data:
