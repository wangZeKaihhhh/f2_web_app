<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="256" height="256" rx="56" ry="56" />
    </clipPath>
  </defs>

  <!-- 纯黑背景 -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="#1a1a1a" />

  <!-- 深色边框 -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="none" stroke="#2a2a2a" stroke-width="2" />

  <!-- F2 几何图形设计 - 使用负空间 -->
  <g fill="#ffffff">
    <!-- 左侧 F 字母的几何形状 -->
    <path d="M 50 70 L 110 70 L 110 90 L 75 90 L 75 115 L 105 115 L 105 135 L 75 135 L 75 186 L 50 186 Z" />

    <!-- 中间装饰性分隔 -->
    <rect x="120" y="100" width="16" height="56" rx="2" />

    <!-- 右侧 2 字母的几何形状 -->
    <path d="M 145 70 L 206 70 L 206 95 Q 206 110 191 110 L 170 110 L 206 161 L 206 186 L 145 186 L 145 161 L 181 161 L 145 110 L 145 95 Q 145 70 145 70 Z" />
  </g>

  <!-- 底部装饰线 -->
  <rect x="50" y="200" width="156" height="3" rx="1.5" fill="#ffffff" opacity="0.3" />
</svg>
